name: Bot-hosting Auto Renew

on:
  # 定时运行（每天 UTC 00:00，即北京时间 08:00）
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install seleniumbase requests

      # 注意：GitHub Actions 自带 gh 命令行，无需额外安装
      - name: 运行续期脚本
        env:
          # 多账号 JSON（从 Secrets 读取）
          ACCOUNTS: ${{ secrets.ACCOUNTS_JSON }}
          # 用于自动更新 SESSION_TOKEN 的 GitHub PAT（需有 repo 权限）
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Telegram 通知（可选）
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 代理配置（默认关闭）
          IS_PROXY: false
          HEADLESS: true   # 无头模式，建议开启
        run: python renew.py
