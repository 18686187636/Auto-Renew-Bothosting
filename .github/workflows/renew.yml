name: Bot-hosting Auto Renew

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（Python）
        run: pip install seleniumbase requests

      # ---------- 新增：安装并启动 sing-box 代理转换层 ----------
      - name: 安装 sing-box
        run: |
          # 下载最新版 sing-box（Linux amd64）
          curl -L https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz -o sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: 生成 sing-box 配置文件（基于 VLESS 链接）
        id: gen_config
        run: |
          # 从环境变量读取 vless 链接
          VLESS="${{ secrets.NODE_LINK }}"
          # 解析 vless 链接参数（简易版，建议使用完整解析）
          # 此处用 Python 生成配置（也可用 jq 等）
          python3 - <<EOF
          import re, json, sys
          from urllib.parse import urlparse, parse_qs

          link = """${VLESS}"""
          if not link:
              sys.exit(0)
          # 解析 vless://uuid@host:port?params#name
          parsed = urlparse(link)
          if parsed.scheme != 'vless':
              sys.exit(1)
          netloc = parsed.netloc  # uuid@host:port
          if '@' in netloc:
              uuid, host_port = netloc.split('@', 1)
          else:
              uuid, host_port = '', netloc
          if ':' in host_port:
              host, port = host_port.split(':', 1)
          else:
              host, port = host_port, '443'
          params = parse_qs(parsed.query)
          # 提取参数
          encryption = params.get('encryption', ['none'])[0]
          security = params.get('security', [''])[0]
          sni = params.get('sni', [''])[0]
          fp = params.get('fp', [''])[0]
          type_ = params.get('type', ['tcp'])[0]
          # 构造 sing-box 配置（入站 socks5，出站 vless）
          config = {
              "log": {"level": "warn"},
              "inbounds": [
                  {
                      "type": "socks",
                      "tag": "socks-in",
                      "listen": "127.0.0.1",
                      "listen_port": 1080,
                      "proxy_protocol": False,
                  }
              ],
              "outbounds": [
                  {
                      "type": "vless",
                      "tag": "vless-out",
                      "server": host,
                      "server_port": int(port),
                      "uuid": uuid,
                      "flow": "xtls-rprx-vision",
                      "tls": {"enabled": True, "server_name": sni, "insecure": False, "utls": {"enabled": True, "fingerprint": fp}},
                      "transport": {"type": type_},
                      "packet_encoding": "packetaddr",
                  }
              ],
              "route": {"rules": [{"outbound": "vless-out", "protocol": ["tcp", "udp"]}]}
          }
          with open("sing-box-config.json", "w") as f:
              json.dump(config, f, indent=2)
          EOF
          # 如果配置文件生成成功，则启动 sing-box
          if [ -f sing-box-config.json ]; then
              echo "✅ sing-box 配置文件已生成"
              nohup sing-box -c sing-box-config.json run > sing-box.log 2>&1 &
              sleep 3
              # 检查端口是否监听
              if netstat -tuln | grep -q ':1080'; then
                echo "✅ sing-box 已启动，监听 127.0.0.1:1080"
              else
                echo "⚠️ sing-box 启动可能失败，查看 sing-box.log"
                cat sing-box.log
                exit 1
              fi
          else
              echo "⚠️ 未提供 NODE_LINK 或解析失败，跳过代理"
          fi
        env:
          VLESS: ${{ secrets.NODE_LINK }}   # 此处直接引用 vless 链接

      # ---------- 运行续期脚本（使用本地代理） ----------
      - name: 运行续期脚本
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 注意：现在 NODE_LINK 指向本地 socks5 代理（sing-box 提供）
          NODE_LINK: "socks5://127.0.0.1:1080"
          HEADLESS: true
        run: python renew.py

      - name: 打印运行日志（可选）
        if: failure()
        run: echo "脚本运行失败，请检查 Secrets 配置及网络环境。"
