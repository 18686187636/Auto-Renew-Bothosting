name: Auto Renew Bot-hosting

on:
  schedule:
    - cron: '0 10 * * *'   # 每天 UTC 10:00（北京时间 18:00）
  workflow_dispatch:

jobs:
  Renew-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: ⚙ 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 🛠️ 安装系统依赖和 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk jq wget net-tools
          pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      # ---------- 内置代理转换（支持 vless 协议） ----------
      - name: 🔗 配置代理（sing-box）
        if: env.NODE_LINK != ''
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          echo "⬇️ 下载 sing-box 二进制..."
          curl -L -o sing-box https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64
          chmod +x sing-box
          sudo mv sing-box /usr/local/bin/

          echo "📝 解析 vless 链接并生成配置文件..."
          python3 << 'EOF'
          import json, re, sys
          from urllib.parse import urlparse, parse_qs

          link = """${NODE_LINK}"""
          if not link:
              sys.exit(0)
          parsed = urlparse(link)
          if parsed.scheme != 'vless':
              print("⚠️ 链接不是 vless 协议，跳过")
              sys.exit(0)

          netloc = parsed.netloc
          if '@' in netloc:
              uuid, host_port = netloc.split('@', 1)
          else:
              uuid, host_port = '', netloc
          if ':' in host_port:
              host, port = host_port.split(':', 1)
          else:
              host, port = host_port, '443'

          params = parse_qs(parsed.query)
          sni = params.get('sni', [''])[0] or host
          fp = params.get('fp', [''])[0] or 'chrome'
          flow = params.get('flow', [''])[0] or 'xtls-rprx-vision'
          type_ = params.get('type', ['tcp'])[0]
          security = params.get('security', [''])[0]

          outbound = {
              "type": "vless",
              "tag": "vless-out",
              "server": host,
              "server_port": int(port),
              "uuid": uuid,
              "flow": flow,
              "tls": {
                  "enabled": True,
                  "server_name": sni,
                  "insecure": False,
                  "utls": {"enabled": True, "fingerprint": fp}
              },
              "transport": {"type": type_},
              "packet_encoding": "packetaddr"
          }
          # Reality 支持
          if security == 'reality':
              pbk = params.get('pbk', [''])[0]
              sid = params.get('sid', [''])[0]
              outbound['tls']['reality'] = {
                  "enabled": True,
                  "public_key": pbk,
                  "short_id": sid
              }
              del outbound['tls']['utls']

          config = {
              "log": {"level": "warn"},
              "inbounds": [
                  {"type": "socks", "tag": "socks-in", "listen": "127.0.0.1", "listen_port": 1080}
              ],
              "outbounds": [outbound],
              "route": {"rules": [{"outbound": "vless-out", "protocol": ["tcp", "udp"]}]}
          }
          with open("sing-box-config.json", "w") as f:
              json.dump(config, f, indent=2)
          EOF

          echo "🚀 启动 sing-box 后台进程..."
          nohup sing-box -c sing-box-config.json run > sing-box.log 2>&1 &
          sleep 5
          if netstat -tuln | grep -q ':1080'; then
              echo "✅ 代理已启动（127.0.0.1:1080）"
          else
              echo "❌ 代理启动失败，查看日志："
              cat sing-box.log
              exit 1
          fi

      # ---------- 运行续期脚本（使用多账号 ACCOUNTS_JSON） ----------
      - name: 🚀 运行续期脚本
        env:
          # 多账号 JSON（主要使用 ACCOUNTS_JSON）
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          # 以下为单账号兼容变量（当 ACCOUNTS_JSON 未设置时回退）
          EMAIL: ${{ secrets.EMAIL }}
          SESSION_TOKEN: ${{ secrets.SESSION_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          # 自动更新 Secret 的 GitHub Token
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Telegram 通知
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 代理配置（若 sing-box 已启动，则使用本地 socks5）
          IS_PROXY: true
          PROXY_SERVER: socks5://127.0.0.1:1080
          HEADLESS: true
        run: |
          xvfb-run --auto-servernum python3 app.py   # 请确保脚本名为 app.py

      - name: 🧽 清理进程和临时文件
        if: always()
        run: |
          pkill -f sing-box || true
          pkill -f chromedriver || true
          pkill -f chrome || true
          pkill -f Xvfb || true
          rm -f sing-box sing-box-config.json sing-box.log

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
